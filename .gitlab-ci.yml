workflow:
  rules:
    - if: $CI_COMMIT_TAG

stages:
  - build

variables:
  ZIP_NAME: "MistEra-${CI_COMMIT_TAG}.7z"
  RELEASE_TAG: "latest"
  BASE_URL: '${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/base/${CI_COMMIT_TAG}/base.zip'

build_and_package:
  stage: build
  script:
    - echo "Zipping the build directory..."
    - .\_7z.exe a $ZIP_NAME $buildDir -p"era"
    - echo "Uploading build 7z as a release..."
    - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file $ZIP_NAME "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/my_package/${CI_COMMIT_TAG}/${ZIP_NAME}"'

